<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="ion-text-center">
      <ion-icon name="person-circle-outline" class="title-icon"></ion-icon>
      ¿Este perfil es tuyo?
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancelar()" fill="clear">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="modal-content">
  <div class="content-wrapper">
    <div class="profile-card">
      <!-- Icono superior decorativo -->
      <div class="profile-icon-wrapper">
        <div class="icon-circle">
          <ion-icon name="school" class="profile-icon"></ion-icon>
        </div>
      </div>

      <!-- Información del profesor -->
      <div class="profile-header">
        <h2 class="profile-name">
          {{ profesor?.nombre }} {{ profesor?.apellido }}
        </h2>
        <p class="profile-email">
          <ion-icon name="mail-outline"></ion-icon>
          {{ profesor?.email }}
        </p>
      </div>

      <!-- Detalles adicionales -->
      <div class="profile-details">
        <div class="detail-item">
          <ion-icon name="call-outline" class="detail-icon"></ion-icon>
          <div class="detail-content">
            <span class="detail-label">Teléfono</span>
            <span class="detail-value">{{ profesor?.telefono }}</span>
          </div>
        </div>

        <div class="detail-item">
          <ion-icon name="ribbon-outline" class="detail-icon"></ion-icon>
          <div class="detail-content">
            <span class="detail-label">Experiencia</span>
            <span class="detail-value">{{ profesor?.experiencia }}</span>
          </div>
        </div>
      </div>

      <!-- Mensaje informativo -->
      <div class="info-message">
        <ion-icon name="information-circle-outline"></ion-icon>
        <p>Al confirmar, este perfil de profesor será vinculado a tu cuenta</p>
      </div>

      <!-- Botones de acción -->
      <div class="action-buttons">
        <ion-button 
          expand="block" 
          class="confirm-button"
          (click)="confirmar()"
        >
          <ion-icon slot="start" name="checkmark-circle-outline"></ion-icon>
          Sí, este perfil es mío
        </ion-button>

        <ion-button
          expand="block"
          fill="outline"
          class="cancel-button"
          (click)="cancelar()"
        >
          <ion-icon slot="start" name="close-circle-outline"></ion-icon>
          No, no soy yo
        </ion-button>
      </div>
    </div>
  </div>

  <!-- Decoración de fondo -->
  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
</ion-content>
